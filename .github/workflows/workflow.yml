name: Node.js CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs of this workflow when a new commit lands on the
# same ref. Saves CI minutes and gets fresh feedback faster.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege defaults; the coverage job's coverallsapp action elevates
# what it needs via its own action permissions.
permissions:
  contents: read

env:
  COVERALLS_REPO_TOKEN: "${{ secrets.COVERALLS_REPO_TOKEN }}"
  COVERALLS_GIT_BRANCH: "${{ github.ref }}"

jobs:
  # Verifies that the committed generated nodeset files are in sync with the
  # XML sources and the current convert tool. Also runs the workspace
  # version-consistency check — both are pure read/verify jobs.
  generated-drift-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'pnpm'
      # --frozen-lockfile: trust pnpm-lock.yaml's workspace link resolution
      # (--no-frozen-lockfile in non-recursive mode falls through to the
      # registry for workspace deps like @sterfive/fix-tsconfigs).
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run consistency
      - run: pnpm run generate
      - name: Check for drift in generated files
        run: |
          if ! git diff --quiet; then
            echo "::error::Generated files are out of sync with their sources or with the convert tool."
            echo "Re-run 'pnpm run generate' locally and commit the result."
            echo ""
            echo "--- changed files ---"
            git diff --stat | head -40
            exit 1
          fi
          echo "Generated files are in sync."

  build_on_windows:
    runs-on: windows-latest
    timeout-minutes: 45
    strategy:
      # Don't cancel the whole matrix when one Node version fails.
      fail-fast: false
      matrix:
        # Node 18/20 dropped: pnpm 11 requires a recent Node (>=22.13 in our setup).
        # node-version: [20.x, 22.x, 24.x]
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      # --ignore-scripts: skip transitive postinstalls (esbuild) so pnpm 11
      # doesn't fail with ERR_PNPM_IGNORED_BUILDS. The explicit `pnpm run
      # build` step that follows does the compile that's actually needed.
      - run: pnpm recursive install --no-frozen-lockfile --ignore-scripts
      # build:all = generate + tsc. Needed because _generated_opcua_types.ts
      # is gitignored; the lean `build` (tsc only) doesn't produce it.
      - run: pnpm run build:all
      - run: pnpm run pretest
      - name: Run tests
        shell: bash
        run: cd packages && node --expose-gc --max-old-space-size=2048 run_all_mocha_tests.js

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # Node 18/20 dropped: pnpm 11 requires a recent Node (>=22.13 in our setup).
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm recursive install --no-frozen-lockfile --ignore-scripts
      # build:all = generate + tsc. Needed because _generated_opcua_types.ts
      # is gitignored; the lean `build` (tsc only) doesn't produce it.
      - run: pnpm run build:all
      - run: pnpm run pretest
      - run: pnpm run test

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: npm install -g c8 coveralls codecov
      - run: pnpm recursive install --no-frozen-lockfile --ignore-scripts
      # build:all = generate + tsc. Needed because _generated_opcua_types.ts
      # is gitignored; the lean `build` (tsc only) doesn't produce it.
      - run: pnpm run build:all
      - run: pnpm run pretest
      - run: make test-cov
      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Playwright end-to-end tests for `node-opcua-client-browser`.
  # Runs the package's specs in a real headless Chromium so the browser-side
  # bundle is exercised end-to-end. Kept in a separate job (rather than
  # folded into `build`) so:
  #   - a Playwright failure surfaces independently from Mocha unit tests,
  #   - the matrix stays small (single Node version, Chromium only),
  #   - the Chromium binary cache is scoped to this job's cache key.
  e2e_browser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm recursive install --no-frozen-lockfile --ignore-scripts
      # build:all = generate + tsc. Needed because _generated_opcua_types.ts
      # is gitignored; the lean `build` (tsc only) doesn't produce it.
      - run: pnpm run build:all
      - run: pnpm run pretest
      # Cache the Chromium binary that `playwright install` downloads (~150 MB).
      # Key includes the resolved Playwright version so a Playwright bump
      # automatically invalidates the cache.
      - name: Read Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('./packages/node-opcua-client-browser/node_modules/@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright Chromium (with system deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter node-opcua-client-browser exec playwright install --with-deps chromium
      - name: Install Playwright system deps only (cached binary)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter node-opcua-client-browser exec playwright install-deps chromium
      - name: Run Playwright E2E
        run: pnpm --filter node-opcua-client-browser run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/node-opcua-client-browser/playwright-report/
          retention-days: 7
