# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

env:
  COVERALLS_REPO_TOKEN: "${{ secrets.COVERALLS_REPO_TOKEN }}"
  COVERALLS_GIT_BRANCH: "${{ github.ref }}"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build_on_windows:
    runs-on: windows-latest
    strategy:
      matrix:
        # Node 18/20 dropped: pnpm 11 requires a recent Node (>=22.13 in our setup).
        # Keep this comment so we can re-enable older lines if we ever downgrade pnpm.
        # node-version: [20.x, 22.x, 24.x]
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm run consistency
      - run: pnpm recursive install --no-frozen-lockfile
      - run: pnpm run build
      - run: pnpm run pretest
      # Node 20 needed --security-revert=CVE-2023-46809; kept here for reference only.
      # - name: Run tests (Node 20 with security revert)
      #   if: matrix.node-version == '20.x'
      #   shell: bash
      #   run: cd packages && node --expose-gc --security-revert=CVE-2023-46809 --max-old-space-size=2048 run_all_mocha_tests.js
      - name: Run tests
        shell: bash
        run: cd packages && node --expose-gc --max-old-space-size=2048 run_all_mocha_tests.js

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node 18/20 dropped: pnpm 11 requires a recent Node (>=22.13 in our setup).
        # node-version: [20.x, 22.x, 24.x]
        # include:
        #   - node-version: 20.x
        #     SECURITY_REVERT_CVE_2023_46809: "--security-revert=CVE-2023-46809"
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm recursive install --no-frozen-lockfile
      - run: pnpm run build
      - run: hostname
      - run: openssl version
      - run: pnpm run pretest
      - run: pnpm run test
        # Node 20 needed: env SECURITY_REVERT_CVE_2023_46809: ${{matrix.SECURITY_REVERT_CVE_2023_46809}}

  # legacy:
  #   runs-on: ubuntu-latest
  #   strategy:
  #     matrix:
  #       node-version: [ 16.x ]

  #   steps:
  #   - uses: actions/checkout@v4
  #   - name: Use Node.js ${{ matrix.node-version }}
  #     uses: actions/setup-node@v4
  #     with:
  #       node-version: ${{ matrix.node-version }}
  #   - run: npm install -g pnpm@7
  #   # remove pnpm-lock.yaml to avoid conflicts
  #   - run: rm pnpm-lock.yaml
  #   # also change the required version in package.json
  #   - run: "sed -i 's/\"pnpm\": \".*\"/\"pnpm\": \">=7.0.0\"/' package.json"
  #   - run: grep pnpm package.json
  #   - run: pnpm recursive install --no-frozen-lockfile
  #   - run: pnpm run build
  #   - run: hostname
  #   - run: openssl version
  #   - run: pnpm run pretest
  #   - run: pnpm test

  coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node 18/20 dropped: pnpm 11 requires a recent Node (>=22.13 in our setup).
        # node-version: [20.x]
        # include:
        #   - node-version: 20.x
        #     SECURITY_REVERT_CVE_2023_46809: "--security-revert=CVE-2023-46809"
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: npm install -g c8 coveralls codecov
      # - run: npm install -g codeclimate-test-reporter
      - run: pnpm recursive install --no-frozen-lockfile
      - run: pnpm run build
      - run: hostname
      - run: openssl version
      - run: pnpm run pretest
      - run: make test-cov
      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
