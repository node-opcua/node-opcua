
stages:
    - build
cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
        - .npm/
        - node_modules/
        - packages/
        - ~/.pnpm-store

.build_template: &build_template
    variables:
        KUBERNETES_CPU_REQUEST: 4
        KUBERNETES_CPU_LIMIT: 4
        KUBERNETES_MEMORY_REQUEST: 4Gi
        KUBERNETES_MEMORY_LIMIT: 4Gi
    stage: build
    before_script:
        - corepack enable
        - corepack prepare --activate
        - pnpm --version
        - pnpm config set store-dir `pwd`/.pnpm-store
        # --ignore-scripts: skip postinstall so pnpm 11 doesn't error on
        # ERR_PNPM_IGNORED_BUILDS for esbuild. The `pnpm run build` below
        # explicitly runs what postinstall would have done.
        - pnpm recursive install --frozen-lockfile=false --ignore-scripts
    script:
        - pnpm run consistency
        # build:all = generate + tsc. Needed because _generated_opcua_types.ts
        # is gitignored; the lean `build` (tsc only) doesn't produce it.
        - pnpm run build:all
        - pnpm run pretest
        - node ${SECURITY_OPTIONS} packages/parallel_test.js
        # - node packages/run_all_mocha_tests.js DISCO3

